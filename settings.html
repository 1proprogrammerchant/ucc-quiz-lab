<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings - UCC Quiz Lab</title>
  <link rel="stylesheet" href="css/base.css" />
</head>
<body>
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;">
    <div style="max-width:640px;width:100%;background:#fff;padding:28px;border-radius:12px;box-shadow:0 6px 30px rgba(0,0,0,0.06);">
      <h1 style="margin-top:0;font-family:Work Sans,Inter,system-ui;">Settings</h1>
      <section style="margin-top:18px;">
        <h3>Change password</h3>
        <form id="changePwd" style="margin-top:8px;">
          <label style="display:block;margin-bottom:6px;color:#444;">Current password</label>
          <input name="old_password" type="password" required style="width:100%;padding:8px;border-radius:8px;border:1px solid #e6e6e6;margin-bottom:8px;" />
          <label style="display:block;margin-bottom:6px;color:#444;">New password</label>
          <input name="new_password" type="password" required style="width:100%;padding:8px;border-radius:8px;border:1px solid #e6e6e6;margin-bottom:12px;" />
          <div id="pwdMsg" style="height:18px;color:#b91c1c;margin-bottom:12px;"></div>
          <button type="submit" style="padding:10px 14px;background:#002975;color:#fff;border:none;border-radius:8px;font-weight:700;">Change password</button>
        </form>
      </section>
      <section style="margin-top:24px;">
        <h3>Account</h3>
        <p style="color:#666;">Manage your account and session.</p>
        <div style="margin-top:8px;">
          <label style="display:block;margin-bottom:8px;color:#444;">Email</label>
          <input id="emailInput" name="email" type="email" placeholder="you@example.com" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e6e6e6;margin-bottom:8px;" />
          <label style="display:block;margin-bottom:8px;color:#444;"><input id="emailNotify" type="checkbox" style="margin-right:8px;"> Receive email notifications</label>
          <div style="margin-top:8px;"><button id="saveEmailBtn" style="padding:8px 12px;border-radius:8px;background:#002975;color:#fff;border:none;font-weight:700;">Save</button></div>
        </div>
        <div style="margin-top:8px;"><button id="logoutBtn" style="padding:8px 12px;border-radius:8px;background:#fff;border:1px solid #002975;color:#002975;font-weight:700;">Logout</button></div>
      </section>
    </div>
  </main>
  <script>
    async function loadAccount(){
      try{
        const res = await fetch('/api/me');
        if (!res.ok) return;
        const data = await res.json();
        if (data && data.ok && data.user){
          document.getElementById('emailInput').value = data.user.email || '';
          // email_notify value may not be present in /api/me; fetch directly from server if needed
        }
      }catch(e){}
    }
    loadAccount();
    document.getElementById('changePwd').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const f = new FormData(e.target);
      const body = { old_password: f.get('old_password'), new_password: f.get('new_password') };
      const msg = document.getElementById('pwdMsg');
      try{
        const res = await fetch('/api/change-password', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        if (res.ok && data.ok){ msg.style.color='#157a00'; msg.textContent = data.message || 'Password changed'; }
        else { msg.style.color='#b91c1c'; msg.textContent = data.message || 'Failed'; }
      }catch(e){ msg.style.color='#b91c1c'; msg.textContent='Network error'; }
    });
    document.getElementById('logoutBtn').addEventListener('click', async ()=>{
      await fetch('/api/logout',{method:'POST'});
      window.location.href = 'login.html';
    });
    document.getElementById('saveEmailBtn').addEventListener('click', async ()=>{
      const email = document.getElementById('emailInput').value;
      const notify = document.getElementById('emailNotify').checked ? 1 : 0;
      try{
        const res = await fetch('/api/set-email', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, email_notify: notify }) });
        if (res.ok) alert('Saved'); else alert('Failed');
      }catch(e){ alert('Network error'); }
    });
  </script>
</body>
</html>
