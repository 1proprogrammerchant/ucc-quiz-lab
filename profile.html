<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile - UCC Quiz Lab</title>
  <link rel="stylesheet" href="css/base.css" />
</head>
<body>
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;">
    <div style="max-width:720px;width:100%;background:#fff;padding:28px;border-radius:12px;box-shadow:0 6px 30px rgba(0,0,0,0.06);">
      <h1 style="margin-top:0;font-family:Work Sans,Inter,system-ui;">Your Profile</h1>
      <p style="color:#555;">This is a simple profile placeholder. You can extend it with user info, progress, and settings.</p>
      <div id="profileWrap" style="display:flex;gap:18px;margin-top:20px;align-items:center;">
        <div id="avatar" style="width:96px;height:96px;border-radius:999px;overflow:hidden;background:#eee;display:flex;align-items:center;justify-content:center;font-weight:700;color:#002975;">--</div>
        <div>
          <p id="profileName" style="margin:0;font-weight:700;font-size:1.1rem;">Guest</p>
          <p id="profileMeta" style="margin:4px 0;color:#666;">Not signed in</p>
          <a href="index.html" style="display:inline-block;margin-top:8px;color:#002975;font-weight:700;">Back to Dashboard</a>
        </div>
      </div>
      <section style="margin-top:28px;">
        <h3 style="margin-bottom:8px;">Progress</h3>
        <p id="profileProgress" style="color:#666;margin:0 0 12px;">Quizzes completed: <strong>0</strong></p>
        <div style="display:flex;gap:8px;">
          <button id="resumeBtn" onclick="location.href='quiz.html'" style="padding:10px 14px;background:#002975;color:#fff;border:none;border-radius:8px;font-weight:700;">Resume Quiz</button>
          <button id="logoutBtn" style="padding:10px 14px;background:#fff;color:#002975;border:1px solid #002975;border-radius:8px;font-weight:700;">Logout</button>
        </div>
      </section>
      <script>
        async function loadProfile(){
          try{
            const res = await fetch('/api/me');
            if (!res.ok) return;
            const data = await res.json();
            if (data.ok && data.user){
              document.getElementById('avatar').textContent = (data.user.username||'U').slice(0,2).toUpperCase();
              document.getElementById('profileName').textContent = data.user.username;
              document.getElementById('profileMeta').textContent = 'Member since ' + (data.user.created_at||'N/A').slice(0,10);
              document.getElementById('profileProgress').innerHTML = 'Quizzes completed: <strong>' + (data.user.quizzes_completed||0) + '</strong>';
            }
          }catch(e){/* ignore */}
        }
        loadProfile();
        document.getElementById('logoutBtn').addEventListener('click', async ()=>{
          await fetch('/api/logout',{method:'POST'});
          window.location.href = 'index.html';
        });
      </script>
    </div>
  </main>
  <script src="js/main.js"></script>
</body>
</html>
